<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%" height="100%">
  <defs>
    <!-- Yellow Hexagon Gradients -->
    <linearGradient id="yellow-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD500"/>
      <stop offset="100%" stop-color="#FFC000"/>
    </linearGradient>
    <linearGradient id="yellow-right" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E6A800"/>
      <stop offset="100%" stop-color="#CC9600"/>
    </linearGradient>
    <linearGradient id="yellow-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#E69500"/>
    </linearGradient>
    <!-- Orange Hexagon Gradients -->
    <linearGradient id="orange-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7B00"/>
      <stop offset="100%" stop-color="#FF6200"/>
    </linearGradient>
    <linearGradient id="orange-right" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E64A00"/>
      <stop offset="100%" stop-color="#CC3F00"/>
    </linearGradient>
    <linearGradient id="orange-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5500"/>
      <stop offset="100%" stop-color="#D94000"/>
    </linearGradient>
    <!-- Teal Hexagon Gradients -->
    <linearGradient id="teal-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D2D6"/>
      <stop offset="100%" stop-color="#00BCC0"/>
    </linearGradient>
    <linearGradient id="teal-right" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#009EA3"/>
      <stop offset="100%" stop-color="#00858A"/>
    </linearGradient>
    <linearGradient id="teal-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B5B8"/>
      <stop offset="100%" stop-color="#009194"/>
    </linearGradient>
  </defs>
  <style>
    .bg { fill: #FFFFFF; }
    .text-dark { fill: #1A1A1A; }
    .bar-yellow { fill: #FFB300; }
    .bar-orange { fill: #FF6200; }
    .bar-teal { fill: #00BCC0; }
  </style>
  <!-- Background Layer -->
  <rect class="bg" width="100%" height="100%" />
  <!-- ========================================== -->
  <!--             HONEYCOMB GRAPHIC              -->
  <!-- ========================================== -->
  <g id="honeycomb" transform="translate(450, 235)">
    <!-- TOP HEXAGON (Yellow) -->
    <g transform="translate(0, -114)">
      <polygon points="0,-92 80,-46 80,46 0,92 -80,46 -80,-46" fill="url(#yellow-right)"/>
      <polygon points="0,-92 -80,-46 -80,46 0,0" fill="url(#yellow-left)"/>
      <polygon points="0,-92 80,-46 0,0" fill="url(#yellow-top)"/>
      <polygon points="0,-64 55,-32 55,32 0,64 -55,32 -55,-32" fill="#FFFFFF"/>
    </g>
    <!-- BOTTOM LEFT HEXAGON (Orange) -->
    <g transform="translate(-97, 54)">
      <polygon points="0,-92 80,-46 80,46 0,92 -80,46 -80,-46" fill="url(#orange-right)"/>
      <polygon points="0,-92 -80,-46 -80,46 0,0" fill="url(#orange-left)"/>
      <polygon points="0,-92 80,-46 0,0" fill="url(#orange-top)"/>
      <polygon points="0,-64 55,-32 55,32 0,64 -55,32 -55,-32" fill="#FFFFFF"/>
    </g>
    <!-- BOTTOM RIGHT HEXAGON (Teal) -->
    <g transform="translate(97, 54)">
      <polygon points="0,-92 80,-46 80,46 0,92 -80,46 -80,-46" fill="url(#teal-right)"/>
      <polygon points="0,-92 -80,-46 -80,46 0,0" fill="url(#teal-left)"/>
      <polygon points="0,-92 80,-46 0,0" fill="url(#teal-top)"/>
      <polygon points="0,-64 55,-32 55,32 0,64 -55,32 -55,-32" fill="#FFFFFF"/>
    </g>
  </g>
</svg>
